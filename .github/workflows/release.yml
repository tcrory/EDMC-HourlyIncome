name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package-and-release:
    name: Package and Release
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Build Release Zip
        run: |
          set -euo pipefail

          package_dir="dist/HourlyIncome"
          zip_name="HourlyIncome-${GITHUB_REF_NAME}.zip"

          mkdir -p "$package_dir"
          cp load.py "$package_dir/"

          cd dist
          zip -r "$zip_name" HourlyIncome

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          asset="dist/HourlyIncome-${TAG_NAME}.zip"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$asset" --clobber
          else
            gh release create "$TAG_NAME" "$asset" \
              --title "$TAG_NAME" \
              --generate-notes
          fi
